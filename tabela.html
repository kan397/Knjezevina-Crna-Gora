<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela Lige</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

header {
    background: linear-gradient(135deg, #111827, #1e3a8a);
    padding: 25px;
    text-align: center;
    box-shadow: 0 4px 15px #0005;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

.container {
    padding: 25px;
}

.table-box {
    background: #111827;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 25px #0008;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #2563eb;
    padding: 15px;
    text-transform: uppercase;
}

td {
    padding: 14px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

tr:hover {
    background: #1e293b;
}

.club {
    text-align: left;
    font-weight: bold;
}

.rank {
    width: 40px;
    font-weight: bold;
}

.points {
    color: #22c55e;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 20px;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>🏆 Tabela Lige</h1>
    <p>Kneževina Crna Gora</p>
</header>

<div class="container">

<div class="table-box">
<table>

<tr>
<th>#</th>
<th>Klub</th>
<th>O</th>
<th>P</th>
<th>N</th>
<th>I</th>
<th>GZ</th>
<th>GP</th>
<th>+/−</th>
<th>Bod</th>
</tr>

<tr>
<td class="rank">1</td>
<td class="club">Bjelipi</td>
<td>10</td>
<td>8</td>
<td>1</td>
<td>1</td>
<td>25</td>
<td>8</td>
<td>+17</td>
<td class="points">25</td>
</tr>

<tr>
<td class="rank">2</td>
<td class="club">Planinari</td>
<td>10</td>
<td>7</td>
<td>2</td>
<td>1</td>
<td>22</td>
<td>10</td>
<td>+12</td>
<td class="points">23</td>
</tr>

<tr>
<td class="rank">3</td>
<td class="club">Mehinagići</td>
<td>10</td>
<td>6</td>
<td>2</td>
<td>2</td>
<td>18</td>
<td>11</td>
<td>+7</td>
<td class="points">20</td>
</tr>

<tr>
<td class="rank">4</td>
<td class="club">Devici</td>
<td>10</td>
<td>5</td>
<td>2</td>
<td>3</td>
<td>15</td>
<td>13</td>
<td>+2</td>
<td class="points">17</td>
</tr>

<tr>
<td class="rank">5</td>
<td class="club">Bratstvo</td>
<td>10</td>
<td>3</td>
<td>3</td>
<td>4</td>
<td>12</td>
<td>15</td>
<td>-3</td>
<td class="points">12</td>
</tr>

</table>
</div>

</div>

<footer>
© Kneževina Crna Gora Liga
</footer>

</body>
</html>
